version: "3.9"
services:
  frontend:
    build: ./my-ndvi-app
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./my-ndvi-app:/app
      - /app/node_modules
    entrypoint: sh -c "sh /app/src/images/rebuild_video.sh && nginx -g 'daemon off;'"

  backend:
    build: ./my-ndvi-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data: